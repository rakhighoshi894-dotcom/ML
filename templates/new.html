<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iris Flower Prediction</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            font-family: Arial, sans-serif;

            background: linear-gradient(
                135deg,
                #ff9a9e,
                #fad0c4,
                #a18cd1,
                #fbc2eb
            );
        }

        .container{

            width: 420px;

            background: white;

            padding: 35px;

            border-radius: 20px;

            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);

            text-align: center;
        }

        .flower{

            font-size: 55px;

            margin-bottom: 10px;
        }

        h1{

            color: #6a11cb;

            margin-bottom: 25px;
        }

        input{

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border: 2px solid #ddd;

            border-radius: 10px;

            font-size: 15px;

            transition: 0.3s;
        }

        input:focus{

            border-color: #6a11cb;

            outline: none;

            box-shadow: 0px 0px 8px rgba(106,17,203,0.4);
        }

        button{

            width: 100%;

            padding: 12px;

            margin-top: 22px;

            border: none;

            border-radius: 10px;

            background: linear-gradient(
                90deg,
                #ff512f,
                #dd2476
            );

            color: white;

            font-size: 17px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{

            transform: scale(1.03);

            opacity: 0.9;
        }

        h2{

            margin-top: 25px;

            color: #28a745;

            background: #eafaf1;

            padding: 12px;

            border-radius: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="flower">
            🌸
        </div>

        <h1>Iris Flower Prediction</h1>

        <form action="/predict1" method="post">

            <input
                type="text"
                name="sepal_length"
                placeholder="Enter Sepal Length"
                required
            >

            <input
                type="text"
                name="sepal_width"
                placeholder="Enter Sepal Width"
                required
            >

            <input
                type="text"
                name="petal_length"
                placeholder="Enter Petal Length"
                required
            >

            <input
                type="text"
                name="petal_width"
                placeholder="Enter Petal Width"
                required
            >

            <button type="submit">
                Predict Flower
            </button>

        </form>

        <h2>
            {{ prediction_text }}
        </h2>

    </div>

</body>

</html>
